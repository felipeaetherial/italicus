function adj(h,a){const n=parseInt(h.replace("#",""),16);
return"#"+[16,8,0].map(s=>Math.max(0,Math.min(255,((n>>s)&0xff)+a)).toString(16).padStart(2,"0")).join("");}

        style={{display:"flex",alignItems:"center",gap:"3px",padding:"3px 6px",borderRadius:"4px",
          border:az===k?"1px solid #f5deb3":"1px solid #333",fontSize:"10px",cursor:"pointer",
          background:az===k?"#2a2a4e":"transparent"}}>
        <div style={{width:"9px",height:"9px",borderRadius:"2px",background:z.color}}/>
        <span style={{color:az===k?"#f5deb3":"#aaa"}}>{z.label}</span>
      </div>
    ))}
  </div>

  <div style={{background:"rgba(245,222,179,0.08)",border:"1px solid rgba(245,222,179,0.2)",borderRadius:"8px",
    padding:"10px 14px",marginTop:"12px",fontSize:"11px",color:"#d4b896",lineHeight:1.6}}>
    <strong>Layout corrigido conforme croqui:</strong><br/>
    • <strong>Fundo 100% ocupado:</strong> dispensa + BWC1 + BWC2 (sem espaço livre atrás)<br/>
    • <strong>Depósito seco relocado</strong> → parede direita do salão (vertical, ao lado da fermentação)<br/>
    • <strong>Dispensa existente</strong> → DML + quadro elétrico<br/>
    • <strong>BWCs existentes</strong> → vestiários (só reformar revestimento + colocar armário)<br/>
    • <strong>Pilar solto</strong> → zona de circulação (não interfere)<br/>
    • <strong>Forno na esquerda</strong> → exaustão sai pela parede lateral
  </div>
  <p style={{textAlign:"center",color:"#666",fontSize:"10px",marginTop:"6px",fontStyle:"italic"}}>
    Confirmar dimensões reais antes de formalizar projeto técnico.
  </p>

{/* ============ ÁREAS ============ */}
{vw==="areas"&&(

        </tr>

      <tr style={{borderTop:"2px solid #f5deb3"}}>
        <td style={{padding:"8px",color:"#f5deb3",fontWeight:700}}>TOTAL</td>
        <td style={{padding:"8px",textAlign:"right",color:"#f5deb3",fontWeight:700,fontFamily:"monospace"}}>70.0</td>
        <td style={{padding:"8px",textAlign:"right",color:"#f5deb3",fontWeight:700}}>100%</td>
        <td></td>
      </tr>
    </tbody>
  </table>
  <div style={{marginTop:"16px",padding:"10px 14px",background:"rgba(46,204,113,0.08)",border:"1px solid rgba(46,204,113,0.2)",borderRadius:"8px",fontSize:"11px",color:"#7dcea0",lineHeight:1.6}}>
    <strong>Vantagem:</strong> ~11m² de estruturas existentes (BWCs+dispensa) já resolvem vestiários e DML.
  </div>
  <div style={{marginTop:"8px",padding:"10px 14px",background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.2)",borderRadius:"8px",fontSize:"11px",color:"#e08080",lineHeight:1.6}}>
    <strong>Trade-off:</strong> Depósito no salão come 5m² de área produtiva. Circulação alta (21%) por conta do pilar
    e da distância recebimento→depósito. Volume máx: ~200-300 pães/dia.
  </div>
</div>
)}

{/* ============ FLUXO ============ */}
{vw==="fluxo"&&(
<div style={{background:"#16213e",borderRadius:"12px",padding:"20px",boxShadow:"0 4px 24px rgba(0,0,0,0.3)"}}>

  <p style={{color:"#888",fontSize:"11px",marginBottom:"16px"}}>Unidirecional — RDC 275</p>
  {FLOW.map((s,i)=>(
    <div key={s.n} style={{display:"flex",alignItems:"flex-start"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginRight:"14px"}}>
        <div style={{width:"32px",height:"32px",borderRadius:"50%",background:ZONES[s.z].color,

          border:"2px solid rgba(255,255,255,0.2)"}}>{s.n}</div>

      </div>
      <div style={{paddingTop:"5px",paddingBottom:i<FLOW.length-1?"14px":"0"}}>
